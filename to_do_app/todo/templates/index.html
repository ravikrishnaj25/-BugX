<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
    <title>To-Do App</title>
</head>
<body>
    <h1>My To-Do List</h1>

    <a href="/add">Add New Task</a>

    <ul>
        {% for t in tasks %}
            <li>
                {% if t.done %}
                    ✔️ <s>{{ t.title }}</s>
                {% else %}
                    {{ t.title }} – <a href="/done/{{ loop.index0 }}">Mark done</a>
                {% endif %}
            </li>
        {% endfor %}
    </ul>
</body>
</html>
